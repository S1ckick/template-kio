<?xml version="1.0" encoding="UTF-8"?>
<config>
  <sourcemap>
    <maps datatype="bibtex" map_overwrite="1">
      <map>
        <map_step map_field_source="journal" map_field_target="journaltitle"/>
        <map_step map_field_source="entrykey" map_match="(.+)"/>
        
        <map_step map_entry_clone="EN-$1"/>
        
        <map_step map_field_set="keywords" 
                  map_field_value="RU"/>
        
        <map_step map_field_set="keywords" 
                  map_field_value="EN" 
                  map_entrytarget="EN-$1"/>
      </map>
    </maps>
  </sourcemap>
</config>
