<?xml version="1.0" encoding="UTF-8"?>
<config>
  <sourcemap>
    <maps datatype="bibtex" map_overwrite="1">
      <map>
        <map_step map_field_source="entrykey" map_match="(.+)"/>
        <map_step map_field_source="journaltitle" map_field_set="journal" map_origfieldval="1"/>
        <map_step map_field_set="journaltitle" map_null="1"/>
        
        <map_step map_entry_clone="EN-$1"/>
      </map>
    </maps>
  </sourcemap>

  <datamodel>
    <fields>
      <field fieldtype="field" datatype="literal">journal</field>
      <field fieldtype="field" datatype="literal">requestnumber</field>
      <field fieldtype="field" datatype="literal">credits</field>
      <field fieldtype="field" datatype="literal">address</field>
      <field fieldtype="field" datatype="literal">location</field>
      <field fieldtype="field" datatype="literal">school</field>
      <field fieldtype="field" datatype="literal">institution</field>
    </fields>
    <entryfields>
      <entrytype>article</entrytype>      
      <field>journal</field>
    </entryfields>
    <entryfields>
      <entrytype>patent</entrytype>      
      <field>requestnumber</field>
      <field>credits</field>
    </entryfields>
    <entryfields>
      <entrytype>phdthesis</entrytype>      
      <field>school</field>
      <field>institution</field>
    </entryfields>
  </datamodel>
  
</config>
